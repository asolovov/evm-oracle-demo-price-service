# Local docker-compose for price-service. Brings up Postgres, runs
# migrations once, then starts the service.
#
# Bring up:
#   docker compose --env-file .env.local up --build
#
# .env.local must define the API keys (SOURCES_*_API_KEY) — see
# .env.example for the full surface. The compose file does NOT bake any
# secret into image / env defaults.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: price_user
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-price_pass}
      POSTGRES_DB: evm_price
    volumes:
      - ./data/db/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U price_user -d evm_price"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: migrate/migrate:v4.18.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database"
      - "postgres://price_user:${DATABASE_PASSWORD:-price_pass}@postgres:5432/evm_price?sslmode=disable"
      - "up"

  price-service:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "50051:50051"   # gRPC
      - "8080:8080"     # healthz / metrics
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: price_user
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-price_pass}
      DATABASE_NAME: evm_price
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 50051
      HEALTHZ_HOST: 0.0.0.0
      HEALTHZ_PORT: 8080
      SOURCES_UNISWAP_V3_API_KEY: ${SOURCES_UNISWAP_V3_API_KEY}
      SOURCES_ALPHA_VANTAGE_API_KEY: ${SOURCES_ALPHA_VANTAGE_API_KEY}
      SOURCES_TWELVE_DATA_API_KEY: ${SOURCES_TWELVE_DATA_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
