name: Release

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  actions: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      next_tag: ${{ steps.next_tag.outputs.next_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install proto tools
        run: make proto-install

      - name: Generate protos
        run: make proto-generate-all

      - name: Install golangci-lint
        run: make lint-install

      - name: Install go-swagger
        run: make swagger-install

      - name: Validate Swagger spec
        run: make swagger-validate

      - name: Generate API code
        run: make generate-api

      - name: Run CI checks (lint)
        run: make lint

      - name: Run CI checks (test)
        run: make test

      - name: Run CI checks (build)
        run: make build

      - name: Determine next tag (semantic)
        id: next_tag
        shell: bash
        run: |
          git fetch --tags

          last_tag=$(git tag --list 'v[0-9]*' | sort -V | tail -n 1)

          if [ -z "$last_tag" ]; then
            echo "next_tag=v1.0.0" | tee -a "$GITHUB_OUTPUT"
            exit 0
          fi

          commits=$(git log "${last_tag}..HEAD" --format='%s' || true)

          bump="patch"
          if echo "$commits" | grep -Eqi 'BREAKING CHANGE'; then
            bump="major"
          elif echo "$commits" | grep -Eqi '^feat(\(|:|!|$)|^feature(\(|:|!|$)'; then
            bump="minor"
          fi
          if echo "$commits" | grep -Eq '^[a-zA-Z]+!:'; then
            bump="major"
          fi

          version=${last_tag#v}
          IFS='.' read -r major minor patch <<< "$version"
          : "${major:=1}"
          : "${minor:=0}"
          : "${patch:=0}"

          case "$bump" in
            major)
              major=$((major + 1)); minor=0; patch=0
              ;;
            minor)
              minor=$((minor + 1)); patch=0
              ;;
            *)
              patch=$((patch + 1))
              ;;
          esac

          next_tag="v${major}.${minor}.${patch}"
          echo "next_tag=$next_tag" | tee -a "$GITHUB_OUTPUT"

      - name: Create tag
        env:
          TAG: ${{ steps.next_tag.outputs.next_tag }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"

  release:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.next_tag }}
          generate_release_notes: true
          name: Release ${{ needs.prepare.outputs.next_tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Build the runtime image and push it to Docker Hub on every merge to main.
  # Publishes two tags: the semantic version computed by `prepare` and `latest`.
  # All third-party actions are SHA-pinned (no floating @vN tags).
  #
  # Requires two repo secrets:
  #   DOCKERHUB_USERNAME — Docker Hub account/namespace (asolovov)
  #   DOCKERHUB_TOKEN    — Docker Hub access token with Read/Write scope
  # ---------------------------------------------------------------------------
  docker:
    name: Build & push image
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Log in to Docker Hub
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (version + latest)
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            docker.io/asolovov/evm-oracle-demo-price-service:${{ needs.prepare.outputs.next_tag }}
            docker.io/asolovov/evm-oracle-demo-price-service:latest
