name: CI

# TODO(NFR-07): SHA-pin every third-party action before merging cross-team.
# Left at major-version tags for now to land the workflow rewrite quickly.

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install codegen + lint tools
        run: make buf-install protoc-install lint-install

      - name: Generate proto stubs
        run: make generate

      - name: Lint
        run: make lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install codegen tools
        run: make buf-install protoc-install

      - name: Generate proto stubs
        run: make generate

      - name: Test
        run: make test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install codegen tools
        run: make buf-install protoc-install

      - name: Build
        # `make build` depends on `make generate`, which the codegen tools above unblock.
        run: make build
